---
global:
  environment: prod
  deployId: 1.4.1
images:
  backend:
    repository: ghcr.io/laflut3/do-royal-backend
    tag: 1.4.1
  frontend:
    repository: ghcr.io/laflut3/do-royal-frontend
    tag: 1.4.1
ingress:
  host: do-royal.polydo.dev
  tls:
    secretName: do-royal-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
externalSecret:
  enabled: true
  name: do-royal
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  vaultPath: prod/do-royal
  keys:
    serverPort: SERVER_PORT
    jdbcDatabaseUrl: JDBC_DATABASE_URL
    postgresDb: POSTGRES_DB
    postgresUser: POSTGRES_USER
    postgresPassword: POSTGRES_PASSWORD
    jwtSecret: DO_ROYAL_JWT_SECRET
