apiVersion: apps/v1
kind: Deployment
metadata:
  name: do-royal-backend
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app: do-royal-backend
    app.kubernetes.io/component: backend
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: {{ .Values.backend.revisionHistoryLimit }}
  selector:
    matchLabels:
      app: do-royal-backend
  template:
    metadata:
      labels:
        app: do-royal-backend
        app.kubernetes.io/component: backend
        {{- include "do-royal.labels" . | nindent 8 }}
      annotations:
        do-royal.io/deploy-id: {{ .Values.global.deployId | quote }}
    spec:
      serviceAccountName: {{ .Values.backend.serviceAccountName | quote }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: {{ include "do-royal.image" .Values.images.backend | quote }}
          imagePullPolicy: Always
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: websocket
              containerPort: 8080
          env:
            - name: VAULT_ADDR
              value: {{ .Values.backend.vault.addr | quote }}
            - name: VAULT_KV_MOUNT
              value: {{ .Values.backend.vault.kvMount | quote }}
            - name: VAULT_SECRET_PATH
              value: {{ .Values.backend.vault.secretPath | quote }}
            - name: VAULT_AUTH_METHOD
              value: {{ .Values.backend.vault.authMethod | quote }}
            - name: VAULT_K8S_AUTH_MOUNT
              value: {{ .Values.backend.vault.k8sAuthMount | quote }}
            - name: VAULT_K8S_ROLE
              value: {{ .Values.backend.vault.k8sRole | quote }}
            - name: VAULT_ENV_MAPPINGS
              value: SERVER_PORT=SERVER_PORT,JDBC_DATABASE_URL=JDBC_DATABASE_URL,POSTGRES_USER=POSTGRES_USER,POSTGRES_PASSWORD=POSTGRES_PASSWORD,DO_ROYAL_JWT_SECRET=DO_ROYAL_JWT_SECRET
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: do-royal-backend
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app: do-royal-backend
    app.kubernetes.io/component: backend
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  selector:
    app: do-royal-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
