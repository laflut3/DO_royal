apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-env-bootstrap
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    {{- include "do-royal.labels" . | nindent 4 }}
data:
  render_vault_env.py: |
    import json
    import os
    import pathlib
    import shlex
    import sys
    import urllib.error
    import urllib.request


    def die(message: str) -> None:
      print(message, file=sys.stderr)
      raise SystemExit(1)


    def request_json(method: str, url: str, *, headers: dict[str, str] | None = None, body: dict | None = None) -> dict:
      payload = None if body is None else json.dumps(body).encode("utf-8")
      req = urllib.request.Request(
        url,
        data=payload,
        headers={"Content-Type": "application/json", **(headers or {})},
        method=method,
      )
      try:
        with urllib.request.urlopen(req, timeout=10) as response:
          return json.loads(response.read().decode("utf-8"))
      except urllib.error.HTTPError as error:
        details = error.read().decode("utf-8", errors="replace")
        die(f"vault request failed for {url}: {error.code} {error.reason}: {details}")
      except urllib.error.URLError as error:
        die(f"vault request failed for {url}: {error.reason}")


    vault_addr = os.environ.get("VAULT_ADDR", "").strip().rstrip("/")
    if not vault_addr:
      die("VAULT_ADDR is required")

    mount = os.environ.get("VAULT_KV_MOUNT", "secret").strip()
    secret_path = os.environ.get("VAULT_SECRET_PATH", "do-royal").strip()
    auth_method = os.environ.get("VAULT_AUTH_METHOD", "kubernetes").strip()
    auth_mount = os.environ.get("VAULT_K8S_AUTH_MOUNT", "kubernetes").strip()
    role = os.environ.get("VAULT_K8S_ROLE", "").strip()
    jwt_path = os.environ.get(
      "VAULT_K8S_JWT_PATH",
      "/var/run/secrets/kubernetes.io/serviceaccount/token",
    ).strip()
    output_path = os.environ.get("VAULT_ENV_OUTPUT_PATH", "/vault/secrets/env").strip()
    mappings = os.environ.get("VAULT_ENV_MAPPINGS", "").strip()

    if not role:
      die("VAULT_K8S_ROLE is required")
    if auth_method != "kubernetes":
      die(f"unsupported VAULT_AUTH_METHOD={auth_method}")
    if not mappings:
      die("VAULT_ENV_MAPPINGS is required")

    jwt_file = pathlib.Path(jwt_path)
    if not jwt_file.is_file():
      die(f"JWT file not found: {jwt_path}")
    jwt = jwt_file.read_text(encoding="utf-8").strip()
    if not jwt:
      die("JWT token is empty")

    login = request_json(
      "POST",
      f"{vault_addr}/v1/auth/{auth_mount}/login",
      body={"role": role, "jwt": jwt},
    )
    token = login.get("auth", {}).get("client_token", "").strip()
    if not token:
      die("vault login did not return a client token")

    secret = request_json(
      "GET",
      f"{vault_addr}/v1/{mount}/data/{secret_path}",
      headers={"X-Vault-Token": token},
    )
    data = secret.get("data", {}).get("data", {})

    exports = []
    for mapping in mappings.split(","):
      target, _, source = mapping.strip().partition("=")
      target = target.strip()
      source = source.strip() or target
      value = str(data.get(source, "")).strip()
      if not target or not value:
        die(f"{source} must exist in Vault")
      exports.append(f"export {target}={shlex.quote(value)}")

    output_file = pathlib.Path(output_path)
    output_file.parent.mkdir(parents=True, exist_ok=True)
    output_file.write_text("\n".join(exports) + "\n", encoding="utf-8")
