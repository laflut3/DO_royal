{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: do-royal-postgres
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app: do-royal-postgres
    app.kubernetes.io/component: postgres
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  serviceName: do-royal-postgres
  replicas: 1
  selector:
    matchLabels:
      app: do-royal-postgres
  template:
    metadata:
      labels:
        app: do-royal-postgres
        app.kubernetes.io/component: postgres
        {{- include "do-royal.labels" . | nindent 8 }}
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.secretName | quote }}
                  key: {{ .Values.externalSecret.keys.postgresPassword | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: do-royal-postgres
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app: do-royal-postgres
    app.kubernetes.io/component: postgres
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  selector:
    app: do-royal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
