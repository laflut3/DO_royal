{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: do-royal-postgres
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app: do-royal-postgres
    app.kubernetes.io/component: postgres
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  serviceName: do-royal-postgres
  replicas: 1
  selector:
    matchLabels:
      app: do-royal-postgres
  template:
    metadata:
      labels:
        app: do-royal-postgres
        app.kubernetes.io/component: postgres
        {{- include "do-royal.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.postgres.serviceAccountName | quote }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: render-postgres-env
          image: python:3.12-alpine
          command:
            - python
            - /scripts/render_vault_env.py
          env:
            - name: VAULT_ADDR
              value: {{ .Values.backend.vault.addr | quote }}
            - name: VAULT_KV_MOUNT
              value: {{ .Values.backend.vault.kvMount | quote }}
            - name: VAULT_SECRET_PATH
              value: {{ .Values.backend.vault.secretPath | quote }}
            - name: VAULT_AUTH_METHOD
              value: {{ .Values.backend.vault.authMethod | quote }}
            - name: VAULT_K8S_AUTH_MOUNT
              value: {{ .Values.backend.vault.k8sAuthMount | quote }}
            - name: VAULT_K8S_ROLE
              value: {{ .Values.backend.vault.k8sRole | quote }}
            - name: VAULT_ENV_OUTPUT_PATH
              value: /vault/secrets/postgres.env
            - name: VAULT_ENV_MAPPINGS
              value: POSTGRES_DB=POSTGRES_DB,POSTGRES_USER=POSTGRES_USER,POSTGRES_PASSWORD=POSTGRES_PASSWORD
          volumeMounts:
            - name: vault-env-bootstrap
              mountPath: /scripts
              readOnly: true
            - name: vault-secrets
              mountPath: /vault/secrets
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              . /vault/secrets/postgres.env
              exec docker-entrypoint.sh postgres
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: vault-secrets
              mountPath: /vault/secrets
              readOnly: true
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - . /vault/secrets/postgres.env && pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - . /vault/secrets/postgres.env && pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: vault-env-bootstrap
          configMap:
            name: vault-env-bootstrap
            defaultMode: 0555
        - name: vault-secrets
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: do-royal-postgres
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app: do-royal-postgres
    app.kubernetes.io/component: postgres
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  selector:
    app: do-royal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
