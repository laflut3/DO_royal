{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    {{- include "do-royal.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /game
            pathType: Prefix
            backend:
              service:
                name: do-royal-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: do-royal-frontend
                port:
                  number: 80
{{- end }}
