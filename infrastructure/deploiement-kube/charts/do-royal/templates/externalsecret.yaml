{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.externalSecret.name | quote }}
  namespace: {{ include "do-royal.namespace" . }}
  labels:
    app.kubernetes.io/component: secrets
    {{- include "do-royal.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
  target:
    name: {{ .Values.externalSecret.name | quote }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.externalSecret.keys.serverPort | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: {{ .Values.externalSecret.keys.serverPort | quote }}
    - secretKey: {{ .Values.externalSecret.keys.jdbcDatabaseUrl | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: {{ .Values.externalSecret.keys.jdbcDatabaseUrl | quote }}
    - secretKey: {{ .Values.externalSecret.keys.postgresDb | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: {{ .Values.externalSecret.keys.postgresDb | quote }}
    - secretKey: {{ .Values.externalSecret.keys.postgresUser | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: {{ .Values.externalSecret.keys.postgresUser | quote }}
    - secretKey: {{ .Values.externalSecret.keys.postgresPassword | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: {{ .Values.externalSecret.keys.postgresPassword | quote }}
    - secretKey: {{ .Values.externalSecret.keys.jwtSecret | quote }}
      remoteRef:
        key: {{ .Values.externalSecret.vaultPath | quote }}
        property: {{ .Values.externalSecret.keys.jwtSecret | quote }}
{{- end }}
