name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BACKEND_CONTEXT: ./battle-royal-back
  FRONTEND_CONTEXT: ./battle-royal-front

jobs:
  quality:
    name: Pre-commit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  backend:
    name: Backend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Test and package
        working-directory: ${{ env.BACKEND_CONTEXT }}
        run: mvn -B -ntp clean package assembly:single

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BACKEND_CONTEXT }}
          file: ${{ env.BACKEND_CONTEXT }}/Dockerfile
          push: false
          tags: do-royal-backend:ci
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20.19.2"
          cache: npm
          cache-dependency-path: battle-royal-front/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_CONTEXT }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_CONTEXT }}
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.FRONTEND_CONTEXT }}
          file: ${{ env.FRONTEND_CONTEXT }}/Dockerfile
          push: false
          tags: do-royal-frontend:ci
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
            VERSION=ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  helm:
    name: Helm
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: >-
          helm lint infrastructure/deploiement-kube/charts/do-royal
          --values infrastructure/deploiement-kube/charts/do-royal/environments/prod.yaml

      - name: Render chart
        run: >-
          helm template do-royal-prod infrastructure/deploiement-kube/charts/do-royal
          --namespace prod
          --values infrastructure/deploiement-kube/charts/do-royal/environments/prod.yaml
          >/dev/null
